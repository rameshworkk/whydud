#cloud-config
# ============================================================
# Whydud — OCI Worker Node Cloud-Init
#
# Provisions an OCI Always Free Ubuntu instance as a Celery worker.
# 1GB RAM — runs single-process Celery on 'scraping' queue.
#
# ┌─────────────────────────────────────────────────────────┐
# │  YOU MUST CHANGE 10 values marked ← CHANGE THIS        │
# │                                                         │
# │  For whyd1 vs whyd2, only 2 lines differ:              │
# │    - WireGuard Address (10.8.0.3 vs 10.8.0.4)          │
# │    - CELERY_WORKER_ID (oci-w1 vs oci-w2)               │
# │    - WG_PRIVATE_KEY (unique per worker)                 │
# └─────────────────────────────────────────────────────────┘
#
# AFTER this runs, do these steps on PRIMARY (95.111.232.70):
#   1. Add worker's WG public key to /etc/wireguard/wg0.conf
#   2. Add pg_hba.conf entry: host all all 10.8.0.X/32 md5
#   3. Reload WG: wg syncconf wg0 <(wg-quick strip wg0)
#   4. Reload PG: docker exec whydud-postgres pg_ctl reload -D /var/lib/postgresql/data
#   5. Open Redis port on firewall: ufw allow from 10.8.0.X to any port 6379
#   6. Open Postgres port: ufw allow from 10.8.0.X to any port 5432
# ============================================================

package_update: true

packages:
  - wireguard
  - curl
  - git
  - ufw
  - jq
  - iptables-persistent
  - netfilter-persistent

write_files:
  # ── WireGuard config ──────────────────────────────────────
  - path: /etc/wireguard/wg0.conf
    permissions: "0600"
    content: |
      [Interface]
      PrivateKey = PASTE_WORKER_PRIVATE_KEY_HERE              # ← CHANGE THIS: from wg genkey (unique per worker)
      Address = 10.8.0.3/24                                   # ← CHANGE THIS: whyd1=10.8.0.3/24, whyd2=10.8.0.4/24

      [Peer]
      PublicKey = PASTE_PRIMARY_WG_PUBLIC_KEY_HERE             # ← CHANGE THIS: from primary's /etc/wireguard/public.key
      Endpoint = 95.111.232.70:51820
      AllowedIPs = 10.8.0.0/24
      PersistentKeepalive = 25

  # ── Worker environment file ───────────────────────────────
  - path: /opt/whydud/.env.worker
    permissions: "0600"
    content: |
      WG_PRIMARY_IP=10.8.0.1
      POSTGRES_DB=whydud
      POSTGRES_USER=whydud
      POSTGRES_PASSWORD=PASTE_HERE                            # ← CHANGE THIS: from primary's POSTGRES_PASSWORD
      REDIS_PASSWORD=PASTE_HERE                               # ← CHANGE THIS: from primary's REDIS_PASSWORD
      DJANGO_SECRET_KEY=PASTE_HERE                            # ← CHANGE THIS: from primary's DJANGO_SECRET_KEY
      MEILISEARCH_MASTER_KEY=PASTE_HERE                       # ← CHANGE THIS: from primary's MEILISEARCH_MASTER_KEY
      EMAIL_ENCRYPTION_KEY=PASTE_HERE                         # ← CHANGE THIS: from primary's EMAIL_ENCRYPTION_KEY
      OAUTH_ENCRYPTION_KEY=PASTE_HERE                         # ← CHANGE THIS: from primary's OAUTH_ENCRYPTION_KEY
      CELERY_WORKER_ID=oci-w1                                 # ← CHANGE THIS: whyd1=oci-w1, whyd2=oci-w2

  # ── Systemd service for auto-start on reboot ──────────────
  - path: /etc/systemd/system/whydud-worker.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Whydud Celery Worker
      Requires=docker.service
      After=docker.service wg-quick@wg0.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/opt/whydud/whydud/docker
      ExecStart=/usr/bin/docker compose -f docker-compose.worker.yml --env-file /opt/whydud/.env.worker up -d --build
      ExecStop=/usr/bin/docker compose -f docker-compose.worker.yml --env-file /opt/whydud/.env.worker down

      [Install]
      WantedBy=multi-user.target

  # ── Update script (run to deploy new code) ────────────────
  - path: /opt/scripts/update-worker.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -e
      echo "[$(date)] Updating whydud worker..."
      cd /opt/whydud/whydud
      git pull origin master
      cd docker
      docker compose -f docker-compose.worker.yml --env-file /opt/whydud/.env.worker up -d --build
      docker image prune -f
      echo "[$(date)] Update complete."

  # ── Health check script (runs via cron every 5 min) ───────
  - path: /opt/scripts/check-worker.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      WG_OK=$(ping -c 1 -W 3 10.8.0.1 2>/dev/null && echo "ok" || echo "FAIL")
      DOCKER_OK=$(docker ps --filter name=worker --format '{{.Status}}' 2>/dev/null | head -1)

      if [ "$WG_OK" != "ok" ]; then
        echo "[$(date)] WireGuard DOWN — restarting"
        systemctl restart wg-quick@wg0
      fi

      if [ -z "$DOCKER_OK" ]; then
        echo "[$(date)] Worker container DOWN — restarting"
        cd /opt/whydud/whydud/docker
        docker compose -f docker-compose.worker.yml --env-file /opt/whydud/.env.worker up -d
      fi

runcmd:
  # ── 1. Firewall ───────────────────────────────────────────
  - ufw allow 22/tcp
  - ufw allow 51820/udp
  - ufw --force enable

  # ── 2. WireGuard ──────────────────────────────────────────
  - systemctl enable wg-quick@wg0
  - systemctl start wg-quick@wg0

  # ── 2b. Fix OCI iptables (INPUT DROP blocks WireGuard return traffic) ──
  - iptables -I INPUT 5 -p udp --dport 51820 -j ACCEPT
  - iptables -I INPUT 6 -s 10.8.0.0/24 -j ACCEPT
  - netfilter-persistent save

  # ── 3. Docker ─────────────────────────────────────────────
  - curl -fsSL https://get.docker.com | sh

  # ── 4. Clone repo ─────────────────────────────────────────
  - mkdir -p /opt/whydud
  - git clone https://PASTE_GITHUB_PAT_HERE@github.com/rameshworkk/whydud.git /opt/whydud/whydud   # ← CHANGE THIS: your GitHub PAT

  # ── 5. Build & start worker ───────────────────────────────
  - cd /opt/whydud/whydud/docker && docker compose -f docker-compose.worker.yml --env-file /opt/whydud/.env.worker up -d --build

  # ── 6. Enable auto-start on reboot ────────────────────────
  - systemctl daemon-reload
  - systemctl enable whydud-worker.service

  # ── 7. Health check cron (every 5 min) ────────────────────
  - echo "*/5 * * * * root /opt/scripts/check-worker.sh >> /var/log/whydud-health.log 2>&1" > /etc/cron.d/whydud-health

  # ── 8. Print summary ─────────────────────────────────────
  - echo "============================================"
  - echo "Whydud worker provisioned!"
  - wg show wg0 public-key || echo "WG not up yet"
  - echo "============================================"
