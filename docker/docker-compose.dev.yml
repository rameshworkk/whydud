# Whydud — Dev Infrastructure Only
# Run Django and Next.js locally, this just provides PostgreSQL, Redis, Meilisearch

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: whydud
      POSTGRES_USER: whydud
      POSTGRES_PASSWORD: whydud_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whydud -d whydud"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 200mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  meilisearch:
    image: getmeili/meilisearch:v1.7
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: whydud_dev_meili_key_32chars!!
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_dev_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------
  # Flower — Celery monitoring dashboard
  # http://localhost:5555 (admin/admin)
  # ----------------------------------------------------------
  flower:
    image: mher/flower:2.0.1
    restart: unless-stopped
    command: celery --broker=redis://redis:6379/0 flower --port=5555 --basic-auth=admin:admin --persistent=True --db=/data/flower.db --max-tasks=50000 --purge-offline-workers=24 --auto-refresh=True
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - flower_dev_data:/data
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0

volumes:
  postgres_dev_data:
  redis_dev_data:
  meilisearch_dev_data:
  flower_dev_data:
