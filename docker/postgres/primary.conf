# TimescaleDB must be preloaded before CREATE EXTENSION can work
shared_preload_libraries = 'timescaledb'
wal_level = replica
max_wal_senders = 5
wal_keep_size = '1GB'
hot_standby = on
synchronous_commit = on
wal_compression = on
shared_buffers = '1GB'
effective_cache_size = '3GB'
work_mem = '32MB'
maintenance_work_mem = '256MB'
max_connections = 200
listen_addresses = '*'
log_min_duration_statement = 1000
log_connections = on
log_disconnections = on
log_line_prefix = '%m [%p] %q%u@%d '
