# PostgreSQL 16 — REPLICA node (8 GB / 4 CPU)
# Receives WAL from primary via streaming replication.

# TimescaleDB must be preloaded — replica replays WAL that references it
shared_preload_libraries = 'timescaledb'

# Replication — replica role
hot_standby = on
hot_standby_feedback = on
max_connections = 100

# Memory — tuned for 8 GB total (container limit 2 GB)
shared_buffers = '512MB'
effective_cache_size = '2GB'
work_mem = '16MB'
maintenance_work_mem = '128MB'

# WAL
wal_compression = on

# Networking
listen_addresses = '*'

# Logging
log_min_duration_statement = 1000
log_connections = on
log_disconnections = on
log_line_prefix = '%m [%p] %q%u@%d '
