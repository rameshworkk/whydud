<!-- Top Bar -->
<header class="h-16 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700
               flex items-center px-6 gap-4 sticky top-0 z-30">
  <!-- Sidebar toggle -->
  <button onclick="toggleSidebar()"
          class="w-9 h-9 flex items-center justify-center border border-slate-200 dark:border-slate-600
                 rounded-lg text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
    <i data-lucide="menu" class="w-4 h-4"></i>
  </button>

  <!-- Page title -->
  <h1 class="text-lg font-semibold text-slate-900 dark:text-slate-100">
    {% block page_title %}Dashboard{% endblock %}
  </h1>

  <!-- Right side controls -->
  <div class="ml-auto flex items-center gap-3">
    <!-- Command palette trigger -->
    <button onclick="document.getElementById('command-palette').classList.toggle('hidden');
                     document.getElementById('command-palette').classList.toggle('flex');
                     document.getElementById('cmd-search').focus();"
            class="flex items-center gap-2 px-3 py-1.5 border border-slate-200 dark:border-slate-600
                   rounded-lg text-[13px] text-slate-400 hover:text-slate-600 bg-slate-50
                   dark:bg-slate-700 transition-colors">
      <i data-lucide="search" class="w-3.5 h-3.5"></i>
      Search
      <kbd class="text-[10px] px-1.5 py-0.5 border border-slate-200 dark:border-slate-600
                  rounded bg-white dark:bg-slate-800 font-mono">Ctrl+K</kbd>
    </button>

    <!-- Theme toggle -->
    <button onclick="toggleTheme()"
            class="w-9 h-9 flex items-center justify-center border border-slate-200 dark:border-slate-600
                   rounded-lg text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
      <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
      <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
    </button>

    <!-- Auto-refresh indicator -->
    {% if auto_refresh %}
    <span class="text-[11px] text-slate-400 px-2.5 py-1 bg-slate-50 dark:bg-slate-700 rounded-full">
      Auto-refreshes every {{ auto_refresh }}s
    </span>
    {% endif %}

    <!-- User avatar -->
    <div class="w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center
                text-[13px] font-semibold">
      {{ request.user.email|first|upper|default:"A" }}
    </div>
  </div>
</header>
