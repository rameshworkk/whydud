[pytest]
DJANGO_SETTINGS_MODULE = whydud.settings.dev
python_files = tests/*.py tests/**/*.py
python_classes = Test*
python_functions = test_*
addopts = -p wmi_fix -v --tb=short --strict-markers -p no:warnings
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    smoke: ultra-fast smoke tests
    infra: infrastructure/service health tests
    api: API endpoint tests
    auth: authentication tests
    celery_task: Celery task tests
    scraping: scraping pipeline tests
    frontend: frontend route tests
